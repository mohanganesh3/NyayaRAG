services:
  postgres:
    image: postgres:15-alpine
    container_name: nyayarag-postgres
    environment:
      POSTGRES_DB: nyayarag
      POSTGRES_USER: nyayarag
      POSTGRES_PASSWORD: nyayarag_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyayarag -d nyayarag"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: nyayarag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.26-community
    container_name: nyayarag-neo4j
    environment:
      NEO4J_AUTH: neo4j/nyayarag_dev_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    container_name: nyayarag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  redis_data:
